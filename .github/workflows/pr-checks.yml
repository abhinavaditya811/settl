name: PR checks

on:
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # gemini extra: tests/test_inbound_model.py mocks the network client but
      # still exercises real google-genai request-building code (types.Generate-
      # ContentConfig) - without the package, that import fails and the classifier
      # silently falls back to the deterministic regex path, masking the mock.
      - run: pip install -e ".[dev,api,db,gemini]"
      # -m pytest (not bare `pytest`) so the repo root lands on sys.path -
      # tests/test_voice_hooks.py etc import fixtures via `from tests.x import y`.
      - run: python -m pytest -q

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # next build already runs lint + tsc + production build in one pass.
      - run: npm run build

  notify-on-failure:
    needs: [backend-tests, frontend-checks]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SETTL_SMTP_USER }}
          password: ${{ secrets.SETTL_SMTP_APP_PASSWORD }}
          from: Settl CI
          to: aditya811.abhinav@gmail.com,ojassharma16@gmail.com
          subject: "Settl CI failed on PR #${{ github.event.pull_request.number }}"
          body: |
            PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.html_url }}

            One or more checks failed. Run details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
