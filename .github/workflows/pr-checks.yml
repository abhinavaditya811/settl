name: PR checks

on:
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Include the `gmail` extra so the Gmail/MCP-server tests (which lazy-import
      # `mcp`) run in CI instead of failing to collect. Keeps `mcp` an optional
      # dependency for production installs that don't need the inbound-mail edge.
      - run: pip install -e ".[dev,api,db,gmail]"
      # -m pytest (not bare `pytest`) so the repo root lands on sys.path -
      # tests/test_voice_hooks.py etc import fixtures via `from tests.x import y`.
      - run: python -m pytest -q

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # next build already runs lint + tsc + production build in one pass.
      - run: npm run build

  notify-on-failure:
    needs: [backend-tests, frontend-checks]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SETTL_SMTP_USER }}
          password: ${{ secrets.SETTL_SMTP_APP_PASSWORD }}
          from: Settl CI
          to: aditya811.abhinav@gmail.com,ojassharma16@gmail.com
          subject: "Settl CI failed on PR #${{ github.event.pull_request.number }}"
          body: |
            PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.html_url }}

            One or more checks failed. Run details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
